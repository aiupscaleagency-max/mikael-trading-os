<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Mikael Trading OS — Inference Dashboard</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
:root{
  --bg:#0a0e17; --card:#111827; --card2:#0f1520; --border:#1e293b;
  --text:#e2e8f0; --dim:#64748b; --green:#10b981; --red:#ef4444;
  --blue:#3b82f6; --yellow:#f59e0b; --purple:#8b5cf6; --cyan:#06b6d4;
  --orange:#fb923c;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:'SF Mono',Monaco,'Cascadia Code',monospace;font-size:13px;line-height:1.45;overflow-x:hidden}
button{font-family:inherit;font-size:13px;cursor:pointer;border:none;background:none;color:var(--text)}
input,select{font-family:inherit;font-size:13px;background:var(--card2);color:var(--text);border:1px solid var(--border);padding:6px 10px;border-radius:4px;outline:none}
input:focus,select:focus{border-color:var(--cyan)}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:var(--card2)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--dim)}

/* HEADER */
header{position:sticky;top:0;z-index:100;background:var(--card);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.brand{font-weight:700;color:var(--cyan);letter-spacing:.5px;font-size:14px}
.brand::before{content:"⬢ ";color:var(--purple)}
.badge{padding:3px 10px;border-radius:4px;font-size:11px;font-weight:700;letter-spacing:.5px}
.badge.paper{background:rgba(16,185,129,.15);color:var(--green);border:1px solid var(--green)}
.badge.live{background:rgba(239,68,68,.15);color:var(--red);border:1px solid var(--red)}
.kill{padding:6px 14px;background:rgba(239,68,68,.1);border:1px solid var(--red);color:var(--red);border-radius:4px;font-weight:700;letter-spacing:.5px}
.kill.active{background:var(--red);color:#fff}
.kill:hover{background:rgba(239,68,68,.2)}
.pnl{margin-left:auto;font-weight:700}
.pnl.up{color:var(--green)} .pnl.down{color:var(--red)}
.run-btn{padding:6px 14px;background:var(--cyan);color:#000;border-radius:4px;font-weight:700;letter-spacing:.3px}
.run-btn:hover{background:#0891b2}
.run-btn:disabled{opacity:.5;cursor:not-allowed}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--dim)}
.dot.live{background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* LAYOUT */
main{display:grid;grid-template-columns:1fr 320px;gap:10px;padding:10px}
.left{display:flex;flex-direction:column;gap:10px;min-width:0}
.right{display:flex;flex-direction:column;gap:10px}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:12px}
.card h3{font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--dim);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.card h3 .tag{margin-left:auto;font-size:10px;color:var(--cyan)}

/* CHART AREA */
.chart-toolbar{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:10px}
.symbol-picker{display:flex;align-items:center;gap:8px}
.symbol-picker select{min-width:120px}
.cur-price{font-size:22px;font-weight:700;margin-right:8px}
.tf-group{display:flex;gap:2px;background:var(--card2);padding:2px;border-radius:4px}
.tf-group button{padding:4px 10px;border-radius:3px;color:var(--dim);font-size:11px}
.tf-group button.active{background:var(--cyan);color:#000;font-weight:700}
.ind-toggles{display:flex;flex-wrap:wrap;gap:4px}
.ind-toggle{padding:4px 8px;background:var(--card2);border:1px solid var(--border);border-radius:3px;color:var(--dim);font-size:11px}
.ind-toggle.on{background:var(--blue);border-color:var(--blue);color:#fff}
.price-row{display:flex;gap:16px;flex-wrap:wrap;font-size:11px;margin-bottom:8px}
.price-row .lbl{color:var(--dim)}
#chart{height:480px;background:var(--card2);border-radius:4px;position:relative}
#rsi-pane,#macd-pane,#vol-pane{height:80px;background:var(--card2);border-radius:4px;margin-top:6px;display:none}
#rsi-pane.on,#macd-pane.on,#vol-pane.on{display:block}

/* BET PANEL */
.bet-panel select,.bet-panel input{width:100%;margin-bottom:8px}
.bet-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.bet-tf{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.bet-tf button{flex:1;min-width:48px;padding:6px;background:var(--card2);border:1px solid var(--border);border-radius:3px;color:var(--dim);font-size:11px}
.bet-tf button.active{background:var(--cyan);color:#000;border-color:var(--cyan);font-weight:700}
.bet-call,.bet-put{padding:14px;border-radius:6px;font-size:14px;font-weight:700;letter-spacing:1px;width:100%;margin-bottom:6px;transition:all .15s}
.bet-call{background:linear-gradient(135deg,var(--green),#059669);color:#fff;box-shadow:0 0 0 1px rgba(16,185,129,.3)}
.bet-put{background:linear-gradient(135deg,var(--red),#dc2626);color:#fff;box-shadow:0 0 0 1px rgba(239,68,68,.3)}
.bet-call:hover,.bet-put:hover{transform:translateY(-1px);filter:brightness(1.1)}
.payout{text-align:center;color:var(--dim);font-size:11px;margin:6px 0}
.payout b{color:var(--yellow);font-size:14px}
.positions-list{max-height:160px;overflow-y:auto;margin-top:8px}
.pos-item{padding:8px;background:var(--card2);border-radius:4px;margin-bottom:4px;font-size:11px;border-left:3px solid var(--blue)}
.pos-item.up{border-left-color:var(--green)} .pos-item.down{border-left-color:var(--red)}
.pos-item .row{display:flex;justify-content:space-between}
.timer{color:var(--yellow);font-weight:700}
.history{max-height:140px;overflow-y:auto;margin-top:8px}
.hist-item{padding:5px 8px;font-size:10px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between}
.hist-item.win{color:var(--green)} .hist-item.loss{color:var(--red)}
.win-rate{text-align:center;font-size:12px;margin-top:6px;padding:6px;background:var(--card2);border-radius:4px}
.win-rate b{color:var(--green)}

/* AGENT-TEAM — varje agent som en "person" med avatar */
.team-banner{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--card2);border-radius:4px;margin-bottom:10px;font-size:11px;flex-wrap:wrap}
.team-banner .auto-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite;flex-shrink:0}
.team-banner b{color:var(--text)}
.team-banner .lbl{color:var(--dim)}
.team-banner .next-run{color:var(--cyan);font-weight:600}
.team-banner .schedule-list{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap}
.team-banner .slot{padding:2px 7px;border-radius:3px;background:var(--bg);border:1px solid var(--border);font-size:10px;color:var(--dim)}
.team-banner .slot.done{color:var(--green);border-color:var(--green)}
.team-banner .slot.next{color:var(--cyan);border-color:var(--cyan);font-weight:700}

.agent-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:8px}
.agent{background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:10px 12px;cursor:pointer;transition:border-color .12s,background .12s,transform .12s;display:grid;grid-template-columns:auto 1fr;grid-template-rows:auto auto auto;gap:3px 10px;align-items:center;position:relative;min-height:84px}
.agent:hover{border-color:var(--cyan);background:#131a26;transform:translateY(-1px)}
.agent.running{border-color:var(--cyan);box-shadow:0 0 0 1px var(--cyan)}

/* Avatar: cirkel + initial, agentens karaktärsfärg */
.agent .avatar{grid-row:1/4;grid-column:1;width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;letter-spacing:.5px;font-family:'SF Mono',monospace;position:relative;flex-shrink:0}
.agent.macro .avatar{background:linear-gradient(135deg,#f59e0b,#d97706)}
.agent.technical .avatar{background:linear-gradient(135deg,#3b82f6,#1d4ed8)}
.agent.sentiment .avatar{background:linear-gradient(135deg,#fb923c,#ea580c)}
.agent.risk .avatar{background:linear-gradient(135deg,#ef4444,#b91c1c)}
.agent.quant .avatar{background:linear-gradient(135deg,#60a5fa,#2563eb)}
.agent.options .avatar{background:linear-gradient(135deg,#eab308,#a16207)}
.agent.portfolio .avatar{background:linear-gradient(135deg,#10b981,#047857)}
.agent.execution .avatar{background:linear-gradient(135deg,#06b6d4,#0e7490)}
.agent.advisor .avatar{background:linear-gradient(135deg,#8b5cf6,#6d28d9)}
.agent.head .avatar{background:linear-gradient(135deg,#fff,#cbd5e1);color:#0a0e17}
.agent .avatar .live-ring{position:absolute;inset:-3px;border-radius:50%;border:2px solid var(--cyan);opacity:0;animation:pulseRing 1.5s infinite}
.agent.running .avatar .live-ring{opacity:1}
@keyframes pulseRing{0%{opacity:.8;transform:scale(1)}100%{opacity:0;transform:scale(1.25)}}
.agent .avatar .star{position:absolute;top:-3px;right:-3px;background:var(--purple);color:#fff;width:14px;height:14px;border-radius:50%;font-size:8px;display:flex;align-items:center;justify-content:center;border:1px solid var(--card2)}
.agent.head .avatar .star{background:var(--cyan);color:#000}

.agent .name-row{grid-column:2;display:flex;flex-direction:column;gap:1px;min-width:0;padding-right:46px}
.agent .person-name{font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.15}
.agent .person-role{font-size:10px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2}
.agent .signal{grid-column:2;font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.agent .signal.green{color:var(--green)} .agent .signal.red{color:var(--red)} .agent .signal.yellow{color:var(--yellow)} .agent .signal.cyan{color:var(--cyan)}
.agent .schedule{grid-column:2;font-size:10px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.agent .schedule b{color:var(--text);font-weight:500}
.agent .model-tag{position:absolute;top:8px;right:10px;padding:1px 6px;background:var(--bg);border:1px solid var(--border);border-radius:2px;text-transform:uppercase;letter-spacing:.3px;font-size:9px;color:var(--dim)}
.agent .model-tag.opus{color:var(--purple);border-color:var(--purple)}
.agent .running-badge{position:absolute;bottom:8px;right:10px;font-size:9px;color:var(--cyan);text-transform:uppercase;letter-spacing:.5px;background:rgba(6,182,212,.1);padding:1px 6px;border-radius:2px;border:1px solid var(--cyan)}
.agent.running .running-badge::before{content:"● "}
/* Detail (i modalen) */
.detail{font-size:11px;color:var(--text);line-height:1.5}
.detail .kv{display:flex;justify-content:space-between;margin:3px 0;padding:2px 0;border-bottom:1px dashed transparent}
.detail .kv .k{color:var(--dim)}
.detail .pill{display:inline-block;padding:1px 7px;border-radius:8px;font-size:10px;background:var(--bg);margin:2px 2px 2px 0;border:1px solid var(--border)}
.detail .pill.green{color:var(--green);border-color:var(--green)}
.detail .pill.red{color:var(--red);border-color:var(--red)}
.detail .pill.yellow{color:var(--yellow);border-color:var(--yellow)}
.detail .pill.blue{color:var(--blue);border-color:var(--blue)}
.detail h4{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin:8px 0 4px;font-weight:600}
.bar{height:6px;background:var(--bg);border-radius:3px;overflow:hidden;margin:4px 0}
.bar > span{display:block;height:100%;background:var(--cyan);border-radius:3px;transition:width .3s}
.bar.red > span{background:var(--red)}
.bar.green > span{background:var(--green)}
.bar.yellow > span{background:var(--yellow)}
.warn{color:var(--yellow);font-size:11px;margin-top:4px;padding:4px 8px;background:rgba(245,158,11,.08);border-left:2px solid var(--yellow);border-radius:2px}
.warn.red{color:var(--red);background:rgba(239,68,68,.08);border-left-color:var(--red)}
.action-list{margin-top:6px}
.action-list .ax{padding:5px 8px;background:var(--bg);border-radius:3px;margin:3px 0;font-size:11px;border-left:2px solid var(--border)}
.action-list .ax.buy{border-left-color:var(--green)}
.action-list .ax.sell{border-left-color:var(--red)}
.rule3{margin-top:8px;font-size:11px;background:var(--bg);padding:8px;border-radius:3px}
.rule3 .step{display:flex;gap:6px;margin:3px 0}
.rule3 .step b{color:var(--cyan);min-width:22px}

.timing{display:flex;gap:14px;flex-wrap:wrap;font-size:10px;color:var(--dim);padding:6px 10px;background:var(--card2);border-radius:4px;margin-top:8px}
.timing b{color:var(--cyan)}

/* TICKER */
.ticker-strip{position:relative;background:var(--card);border-top:1px solid var(--border);border-bottom:1px solid var(--border);overflow:hidden;height:36px;display:flex;align-items:center}
.ticker-track{display:flex;gap:24px;white-space:nowrap;animation:ticker 80s linear infinite;padding-left:100%}
.ticker-track:hover{animation-play-state:paused}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-100%)}}
.tk{display:inline-flex;gap:6px;align-items:center;font-size:11px;cursor:pointer}
.tk:hover{color:var(--cyan)}
.tk b{font-weight:700}
.tk .ch{font-size:10px}
.tk .ch.up{color:var(--green)} .tk .ch.down{color:var(--red)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:200;padding:20px}
.modal-bg.on{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:6px;width:100%;max-width:640px;padding:0;max-height:88vh;display:flex;flex-direction:column;position:relative;overflow:hidden}
.modal-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--card2)}
.modal-header .modal-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:#fff;letter-spacing:.5px;flex-shrink:0;position:relative}
.modal-header .modal-avatar .star{position:absolute;top:-2px;right:-2px;background:var(--purple);color:#fff;width:16px;height:16px;border-radius:50%;font-size:9px;display:flex;align-items:center;justify-content:center;border:2px solid var(--card2)}
.modal-header .modal-info{display:flex;flex-direction:column;gap:2px;min-width:0;flex:1}
.modal-header h2{font-size:14px;font-weight:700;color:var(--text);letter-spacing:.2px;margin:0}
.modal-header .modal-role{font-size:11px;color:var(--dim)}
.modal-header .meta{font-size:10px;color:var(--dim);text-align:right}
.modal-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--card2)}
.modal-tabs button{flex:1;padding:8px;font-size:11px;color:var(--dim);border-bottom:2px solid transparent;letter-spacing:.4px;text-transform:uppercase;font-weight:600}
.modal-tabs button.on{color:var(--cyan);border-bottom-color:var(--cyan)}
.modal-body{flex:1;overflow-y:auto;padding:14px;min-height:240px;max-height:480px}
.modal-tab{display:none}
.modal-tab.on{display:block}
.modal .chat{background:var(--card2);border-radius:4px;padding:10px;font-size:12px;line-height:1.5;min-height:180px}
.chat .q{color:var(--cyan);margin:8px 0 3px;font-weight:600}
.chat .a{color:var(--text);margin-bottom:10px;white-space:pre-wrap;padding-left:10px;border-left:2px solid var(--border)}
.modal-footer{padding:10px 14px;border-top:1px solid var(--border);background:var(--card2);display:flex;gap:6px}
.modal-footer input{flex:1}
.modal-footer .send{padding:7px 16px;background:var(--cyan);color:#000;border-radius:4px;font-weight:700;letter-spacing:.3px}
.modal-footer .send:hover{background:#0891b2}
.modal-footer .send.order{background:var(--green);color:#fff}
.modal-footer .send.order:hover{background:#059669}
.modal .close{position:absolute;top:10px;right:12px;color:var(--dim);font-size:20px;background:none;border:none;cursor:pointer;z-index:10}
.modal .close:hover{color:var(--text)}
.quick-prompts{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.quick-prompts button{font-size:10px;padding:3px 8px;background:var(--card);border:1px solid var(--border);border-radius:3px;color:var(--dim)}
.quick-prompts button:hover{color:var(--cyan);border-color:var(--cyan)}

/* SETTINGS */
.settings{background:var(--card);border:1px solid var(--border);border-radius:6px;margin:10px;padding:12px}
.settings summary{cursor:pointer;font-size:12px;letter-spacing:.5px;color:var(--dim);text-transform:uppercase;font-weight:700}
.settings summary::marker{color:var(--cyan)}
.settings[open] summary{margin-bottom:10px}
.settings .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
.settings label{display:block;font-size:11px;color:var(--dim);margin-bottom:4px}
.settings input{width:100%}
.test-btn{padding:6px 14px;background:var(--blue);color:#fff;border-radius:4px;font-weight:700;margin-top:6px}
.status-line{margin-top:8px;font-size:11px}
.status-line.ok{color:var(--green)}
.status-line.err{color:var(--red)}
.status-line.warn{color:var(--yellow)}

/* RESPONSIVE */
@media (max-width:1279px){
  main{grid-template-columns:1fr}
  #chart{height:360px}
}
@media (max-width:767px){
  header{font-size:11px;gap:8px;padding:8px}
  .brand{font-size:12px}
  .agent-grid{grid-template-columns:1fr}
  #chart{height:280px}
}
</style>
</head>
<body>

<header>
  <span class="brand">MIKAEL TRADING OS</span>
  <span class="dot live" id="conn-dot" title="Connection"></span>
  <select id="broker-select">
    <option value="binance">Binance</option>
    <option value="alpaca">Alpaca</option>
    <option value="blofin">Blofin</option>
  </select>
  <span class="badge paper" id="mode-badge">PAPER</span>
  <button class="kill" id="kill-btn">⏻ KILL SWITCH</button>
  <span class="pnl up" id="pnl">+$0.00 (0.00%)</span>
  <button class="run-btn" id="run-btn">▶ Kör analys</button>
</header>

<main>
  <!-- LEFT: CHART + AGENTS -->
  <div class="left">
    <div class="card">
      <div class="chart-toolbar">
        <div class="symbol-picker">
          <select id="cat-select">
            <option value="crypto">Crypto / USDT</option>
            <option value="cross">Korspar</option>
            <option value="forex">Forex</option>
            <option value="stocks">Aktier</option>
            <option value="index">Index</option>
            <option value="commod">Råvaror</option>
          </select>
          <select id="sym-select"></select>
        </div>
        <span class="cur-price" id="cur-price">--</span>
        <span id="cur-chg" class="ch">--</span>
        <div class="tf-group" id="tf-group">
          <button data-tf="1m">1m</button>
          <button data-tf="5m">5m</button>
          <button data-tf="15m">15m</button>
          <button data-tf="30m">30m</button>
          <button data-tf="1h" class="active">1h</button>
          <button data-tf="4h">4h</button>
          <button data-tf="1d">1d</button>
          <button data-tf="1w">1w</button>
        </div>
        <div class="ind-toggles" id="ind-toggles">
          <button class="ind-toggle" data-ind="sma20">SMA20</button>
          <button class="ind-toggle" data-ind="sma50">SMA50</button>
          <button class="ind-toggle" data-ind="sma200">SMA200</button>
          <button class="ind-toggle" data-ind="ema9">EMA9</button>
          <button class="ind-toggle" data-ind="ema21">EMA21</button>
          <button class="ind-toggle" data-ind="bb">BB(20,2)</button>
          <button class="ind-toggle" data-ind="vwap">VWAP</button>
          <button class="ind-toggle" data-ind="rsi">RSI</button>
          <button class="ind-toggle" data-ind="macd">MACD</button>
          <button class="ind-toggle" data-ind="vol">Volume</button>
        </div>
      </div>
      <div class="price-row">
        <span><span class="lbl">24h:</span> <b id="d-chg">--</b></span>
        <span><span class="lbl">High:</span> <b id="d-hi">--</b></span>
        <span><span class="lbl">Low:</span> <b id="d-lo">--</b></span>
        <span><span class="lbl">Vol:</span> <b id="d-vol">--</b></span>
      </div>
      <div id="chart"></div>
      <div id="vol-pane"></div>
      <div id="rsi-pane"></div>
      <div id="macd-pane"></div>
    </div>

    <div class="card">
      <h3>AI-Team <span class="tag" id="last-turn">väntar…</span></h3>
      <div class="team-banner" id="team-banner"></div>

<script>
"use strict";

/* ======================================================================
   KONFIG
   ====================================================================== */
const CFG = {
  url: localStorage.getItem("trading_url") || "https://trading.aiupscale.agency",
  key: localStorage.getItem("trading_key") || "",
  mode: localStorage.getItem("trading_mode") || "demo"
};

const SYMBOLS = {
  crypto: ["BTCUSDT","ETHUSDT","SOLUSDT","BNBUSDT","XRPUSDT","ADAUSDT","AVAXUSDT","DOGEUSDT","DOTUSDT","MATICUSDT","LINKUSDT","UNIUSDT","LTCUSDT","ATOMUSDT","NEARUSDT"],
  cross: ["BTC/ETH","ETH/BTC","SOL/BTC","SOL/ETH","BNB/BTC","XRP/BTC"],
  forex: ["EUR/USD","GBP/USD","USD/JPY","USD/CHF","AUD/USD","USD/CAD","EUR/GBP","EUR/JPY","GBP/JPY"],
  stocks: ["TSLA","NVDA","AAPL","MSFT","AMZN","META","GOOGL","AMD","NFLX","DIS"],
  index: ["SPY","QQQ","DIA","IWM"],
  commod: ["XAU/USD","XAG/USD","USOIL","NATGAS"]
};
const ALL_SYMS = Object.values(SYMBOLS).flat();

const BASE_PRICES = {
  BTCUSDT:67500, ETHUSDT:3450, SOLUSDT:178, BNBUSDT:580, XRPUSDT:0.62, ADAUSDT:0.45,
  AVAXUSDT:38, DOGEUSDT:0.165, DOTUSDT:7.8, MATICUSDT:0.74, LINKUSDT:14.2, UNIUSDT:9.5,
  LTCUSDT:84, ATOMUSDT:8.4, NEARUSDT:5.6,
  "BTC/ETH":19.6, "ETH/BTC":0.051, "SOL/BTC":0.0026, "SOL/ETH":0.052, "BNB/BTC":0.0086, "XRP/BTC":0.0000092,
  "EUR/USD":1.0850, "GBP/USD":1.2680, "USD/JPY":149.50, "USD/CHF":0.8830,
  "AUD/USD":0.6620, "USD/CAD":1.3580, "EUR/GBP":0.8550, "EUR/JPY":162.20, "GBP/JPY":189.60,
  TSLA:245, NVDA:142, AAPL:228, MSFT:418, AMZN:185, META:495, GOOGL:172, AMD:158, NFLX:680, DIS:96,
  SPY:565, QQQ:485, DIA:425, IWM:218,
  "XAU/USD":2380, "XAG/USD":29.80, USOIL:74.50, NATGAS:2.35
};

const VOL = {
  crypto:0.025, cross:0.018, forex:0.004, stocks:0.012, index:0.008, commod:0.015
};

function symCategory(sym){
  for(const k in SYMBOLS) if(SYMBOLS[k].includes(sym)) return k;
  return "crypto";
}

/* ======================================================================
   STATE
   ====================================================================== */
const STATE = {
  symbol:"BTCUSDT", tf:"1h",
  betSym:"BTCUSDT", betTf:300, betAmt:10,
  indicators:{sma20:false,sma50:false,sma200:false,ema9:false,ema21:false,bb:false,vwap:false,rsi:false,macd:false,vol:false},
  positions:[], history:[],
  candleData:{},  // { "BTCUSDT|1h": [{time,open,high,low,close,volume}, ...] }
  livePrices:{},
  killActive:false,
  agents:{}
};

/* ======================================================================
   CHART
   ====================================================================== */
let chart, candleSeries, volSeries, rsiChart, rsiSeries, macdChart, macdLine, macdSig, macdHist, indicatorSeries={};

function initChart(){
  chart = LightweightCharts.createChart(document.getElementById("chart"),{
    layout:{background:{color:"#0f1520"},textColor:"#e2e8f0",fontFamily:"SF Mono,monospace"},
    grid:{vertLines:{color:"#1e293b"},horzLines:{color:"#1e293b"}},
    crosshair:{mode:1},
    rightPriceScale:{borderColor:"#1e293b"},
    timeScale:{borderColor:"#1e293b",timeVisible:true,secondsVisible:false},
    width:document.getElementById("chart").clientWidth, height:480
  });
  candleSeries = chart.addCandlestickSeries({
    upColor:"#10b981", downColor:"#ef4444",
    borderUpColor:"#10b981", borderDownColor:"#ef4444",
    wickUpColor:"#10b981", wickDownColor:"#ef4444"
  });
  window.addEventListener("resize",()=>{ chart.applyOptions({width:document.getElementById("chart").clientWidth}); });
}

function genCandles(sym, tf, n=300){
  const cat = symCategory(sym);
  const vol = VOL[cat];
  const tfSec = ({"1m":60,"5m":300,"15m":900,"30m":1800,"1h":3600,"4h":14400,"1d":86400,"1w":604800})[tf] || 3600;
  const now = Math.floor(Date.now()/1000);
  let price = BASE_PRICES[sym] || 100;
  // Walk backwards to start price
  const seedPrice = price * (1 + (Math.random()-.5)*0.05);
  price = seedPrice;
  const out = [];
  for(let i=n; i>=1; i--){
    const t = now - i*tfSec;
    const open = price;
    const drift = (Math.random()-.5)*vol*price;
    const close = open + drift + Math.sin(i/15)*vol*price*0.3;
    const high = Math.max(open,close) + Math.random()*vol*price*0.5;
    const low = Math.min(open,close) - Math.random()*vol*price*0.5;
    const volume = Math.round(50000 + Math.random()*200000);
    out.push({time:t, open, high, low, close, volume});
    price = close;
  }
  return out;
}

function loadCandles(sym, tf){
  const key = sym+"|"+tf;
  if(!STATE.candleData[key]) STATE.candleData[key] = genCandles(sym,tf,300);
  const data = STATE.candleData[key];
  candleSeries.setData(data.map(c=>({time:c.time,open:c.open,high:c.high,low:c.low,close:c.close})));
  applyIndicators(data);
  updatePriceHeader(data);
}

function applyIndicators(data){
  // Clear existing indicator series
  Object.values(indicatorSeries).forEach(s=>{ try{ chart.removeSeries(s); }catch(e){} });
  indicatorSeries = {};
  const closes = data.map(c=>c.close);
  const times = data.map(c=>c.time);

  function sma(period){
    const out=[];
    for(let i=period-1;i<closes.length;i++){
      let s=0; for(let j=i-period+1;j<=i;j++) s+=closes[j];
      out.push({time:times[i], value:s/period});
    }
    return out;
  }
  function ema(period){
    const k=2/(period+1); const out=[]; let prev=closes[0];
    for(let i=0;i<closes.length;i++){
      prev = i===0 ? closes[0] : closes[i]*k + prev*(1-k);
      if(i>=period-1) out.push({time:times[i], value:prev});
    }
    return out;
  }

  const ind = STATE.indicators;
  if(ind.sma20){ indicatorSeries.sma20 = chart.addLineSeries({color:"#06b6d4",lineWidth:1,title:"SMA20"}); indicatorSeries.sma20.setData(sma(20)); }
  if(ind.sma50){ indicatorSeries.sma50 = chart.addLineSeries({color:"#f59e0b",lineWidth:1,title:"SMA50"}); indicatorSeries.sma50.setData(sma(50)); }
  if(ind.sma200){ indicatorSeries.sma200 = chart.addLineSeries({color:"#8b5cf6",lineWidth:1,title:"SMA200"}); indicatorSeries.sma200.setData(sma(200)); }
  if(ind.ema9){ indicatorSeries.ema9 = chart.addLineSeries({color:"#10b981",lineWidth:1,title:"EMA9"}); indicatorSeries.ema9.setData(ema(9)); }
  if(ind.ema21){ indicatorSeries.ema21 = chart.addLineSeries({color:"#ef4444",lineWidth:1,title:"EMA21"}); indicatorSeries.ema21.setData(ema(21)); }
  if(ind.bb){
    const period=20, mult=2;
    const mid=sma(period);
    const upper=[], lower=[];
    for(let k=0;k<mid.length;k++){
      const i=k+period-1;
      let mean=mid[k].value, vSum=0;
      for(let j=i-period+1;j<=i;j++) vSum += (closes[j]-mean)**2;
      const sd = Math.sqrt(vSum/period);
      upper.push({time:times[i], value:mean+mult*sd});
      lower.push({time:times[i], value:mean-mult*sd});
    }
    indicatorSeries.bbU=chart.addLineSeries({color:"#3b82f6",lineWidth:1,title:"BB upper",lineStyle:2});
    indicatorSeries.bbL=chart.addLineSeries({color:"#3b82f6",lineWidth:1,title:"BB lower",lineStyle:2});
    indicatorSeries.bbM=chart.addLineSeries({color:"#3b82f6",lineWidth:1,title:"BB mid"});
    indicatorSeries.bbU.setData(upper); indicatorSeries.bbL.setData(lower); indicatorSeries.bbM.setData(mid);
  }
  if(ind.vwap){
    let cumPV=0, cumV=0; const out=[];
    for(let i=0;i<data.length;i++){
      const tp=(data[i].high+data[i].low+data[i].close)/3;
      cumPV += tp*data[i].volume; cumV += data[i].volume;
      out.push({time:times[i], value:cumPV/cumV});
    }
    indicatorSeries.vwap=chart.addLineSeries({color:"#fb923c",lineWidth:1,title:"VWAP"});
    indicatorSeries.vwap.setData(out);
  }

  // Pane: RSI
  const rsiPane = document.getElementById("rsi-pane");
  if(ind.rsi){
    rsiPane.classList.add("on");
    if(!rsiChart){
      rsiChart = LightweightCharts.createChart(rsiPane,{
        layout:{background:{color:"#0f1520"},textColor:"#94a3b8",fontFamily:"SF Mono,monospace",fontSize:10},
        grid:{vertLines:{color:"#1e293b"},horzLines:{color:"#1e293b"}},
        rightPriceScale:{borderColor:"#1e293b"}, timeScale:{visible:false},
        width:rsiPane.clientWidth, height:80
      });
      rsiSeries = rsiChart.addLineSeries({color:"#fbbf24",lineWidth:1});
    }
    const rsi = computeRSI(closes,14);
    rsiSeries.setData(rsi.map((v,i)=>({time:times[i+14],value:v})));
  } else { rsiPane.classList.remove("on"); }

  // Pane: MACD
  const macdPane = document.getElementById("macd-pane");
  if(ind.macd){
    macdPane.classList.add("on");
    if(!macdChart){
      macdChart = LightweightCharts.createChart(macdPane,{
        layout:{background:{color:"#0f1520"},textColor:"#94a3b8",fontFamily:"SF Mono,monospace",fontSize:10},
        grid:{vertLines:{color:"#1e293b"},horzLines:{color:"#1e293b"}},
        rightPriceScale:{borderColor:"#1e293b"}, timeScale:{visible:false},
        width:macdPane.clientWidth, height:80
      });
      macdLine = macdChart.addLineSeries({color:"#3b82f6",lineWidth:1});
      macdSig = macdChart.addLineSeries({color:"#ef4444",lineWidth:1});
      macdHist = macdChart.addHistogramSeries({color:"#64748b"});
    }
    const m = computeMACD(closes);
    macdLine.setData(m.macd.map((v,i)=>({time:times[i],value:v})));
    macdSig.setData(m.signal.map((v,i)=>({time:times[i],value:v})));
    macdHist.setData(m.hist.map((v,i)=>({time:times[i],value:v,color:v>=0?"#10b981":"#ef4444"})));
  } else { macdPane.classList.remove("on"); }

  // Pane: Volume
  const volPane = document.getElementById("vol-pane");
  if(ind.vol){
    volPane.classList.add("on");
    if(!window._volChart){
      window._volChart = LightweightCharts.createChart(volPane,{
        layout:{background:{color:"#0f1520"},textColor:"#94a3b8",fontFamily:"SF Mono,monospace",fontSize:10},
        grid:{vertLines:{color:"#1e293b"},horzLines:{color:"#1e293b"}},
        rightPriceScale:{borderColor:"#1e293b"}, timeScale:{visible:false},
        width:volPane.clientWidth, height:80
      });
      window._volSer = window._volChart.addHistogramSeries({color:"#64748b"});
    }
    window._volSer.setData(data.map(c=>({time:c.time,value:c.volume,color:c.close>=c.open?"#10b98166":"#ef444466"})));
  } else { volPane.classList.remove("on"); }
}

function computeRSI(closes, period){
  const out=[]; let gains=0, losses=0;
  for(let i=1;i<=period;i++){
    const d = closes[i]-closes[i-1];
    if(d>=0) gains += d; else losses -= d;
  }
  let avgG = gains/period, avgL = losses/period;
  out.push(100 - 100/(1 + avgG/(avgL||1e-9)));
  for(let i=period+1;i<closes.length;i++){
    const d = closes[i]-closes[i-1];
    const g = d>=0?d:0, l = d<0?-d:0;
    avgG = (avgG*(period-1)+g)/period;
    avgL = (avgL*(period-1)+l)/period;
    out.push(100 - 100/(1 + avgG/(avgL||1e-9)));
  }
  return out;
}
function computeMACD(closes){
  function ema(arr,p){ const k=2/(p+1); const o=[arr[0]]; for(let i=1;i<arr.length;i++) o.push(arr[i]*k+o[i-1]*(1-k)); return o; }
  const e12=ema(closes,12), e26=ema(closes,26);
  const macd = e12.map((v,i)=>v-e26[i]);
  const signal = ema(macd,9);
  const hist = macd.map((v,i)=>v-signal[i]);
  return {macd,signal,hist};
}

function updatePriceHeader(data){
  const last=data[data.length-1], first=data[Math.max(0,data.length-24)];
  const chg = ((last.close-first.close)/first.close)*100;
  const hi = Math.max(...data.slice(-24).map(c=>c.high));
  const lo = Math.min(...data.slice(-24).map(c=>c.low));
  const v = data.slice(-24).reduce((s,c)=>s+c.volume,0);
  document.getElementById("cur-price").textContent = formatPrice(last.close, STATE.symbol);
  const chgEl = document.getElementById("cur-chg");
  chgEl.textContent = (chg>=0?"+":"")+chg.toFixed(2)+"%";
  chgEl.style.color = chg>=0 ? "var(--green)" : "var(--red)";
  document.getElementById("d-chg").textContent = (chg>=0?"+":"")+chg.toFixed(2)+"%";
  document.getElementById("d-chg").style.color = chg>=0 ? "var(--green)" : "var(--red)";
  document.getElementById("d-hi").textContent = formatPrice(hi,STATE.symbol);
  document.getElementById("d-lo").textContent = formatPrice(lo,STATE.symbol);
  document.getElementById("d-vol").textContent = formatVol(v);
}

function formatPrice(p, sym){
  if(p>=1000) return p.toFixed(2);
  if(p>=10) return p.toFixed(2);
  if(p>=0.1) return p.toFixed(4);
  return p.toFixed(6);
}
function formatVol(v){
  if(v>1e9) return (v/1e9).toFixed(2)+"B";
  if(v>1e6) return (v/1e6).toFixed(2)+"M";
  if(v>1e3) return (v/1e3).toFixed(1)+"K";
  return ""+v;
}

/* ======================================================================
   SYMBOL & TIMEFRAME PICKERS
   ====================================================================== */
function fillSymbols(){
  const cat = document.getElementById("cat-select").value;
  const sel = document.getElementById("sym-select");
  sel.innerHTML = SYMBOLS[cat].map(s=>`<option value="${s}">${s}</option>`).join("");
  sel.value = SYMBOLS[cat][0];
  STATE.symbol = sel.value;
}
function fillBetSymbols(){
  const sel = document.getElementById("bet-sym");
  sel.innerHTML = "";
  for(const k in SYMBOLS){
    const og = document.createElement("optgroup");
    og.label = ({crypto:"Crypto",cross:"Korspar",forex:"Forex",stocks:"Aktier",index:"Index",commod:"Råvaror"})[k];
    SYMBOLS[k].forEach(s=>{ const o=document.createElement("option"); o.value=s; o.textContent=s; og.appendChild(o); });
    sel.appendChild(og);
  }
  sel.value = "BTCUSDT";
}

/* ======================================================================
   LIVE TICK SIMULATOR (every 2s)
   ====================================================================== */
function tick(){
  // update last candle for current symbol/tf and live prices for all
  ALL_SYMS.forEach(sym=>{
    const cat = symCategory(sym);
    const vol = VOL[cat];
    const cur = STATE.livePrices[sym] ?? BASE_PRICES[sym] ?? 100;
    const next = cur * (1 + (Math.random()-.5)*vol*0.15);
    STATE.livePrices[sym] = next;
  });

  const key = STATE.symbol+"|"+STATE.tf;
  const data = STATE.candleData[key];
  if(data && data.length){
    const last = data[data.length-1];
    last.close = STATE.livePrices[STATE.symbol];
    last.high = Math.max(last.high, last.close);
    last.low = Math.min(last.low, last.close);
    candleSeries.update({time:last.time, open:last.open, high:last.high, low:last.low, close:last.close});
    document.getElementById("cur-price").textContent = formatPrice(last.close, STATE.symbol);
  }

  // evaluate active positions
  evalPositions();
  updateTickerStrip();
  updatePnL();
}

function updateTickerStrip(){
  const tk = document.getElementById("ticker");
  if(!tk._init){
    tk.innerHTML = ALL_SYMS.map(s=>{
      const p = STATE.livePrices[s] ?? BASE_PRICES[s] ?? 100;
      return `<span class="tk" data-sym="${s}"><b>${s}</b> <span class="px">${formatPrice(p,s)}</span> <span class="ch up">+0.00%</span></span>`;
    }).join("") + ALL_SYMS.map(s=>{
      const p = STATE.livePrices[s] ?? BASE_PRICES[s] ?? 100;
      return `<span class="tk" data-sym="${s}"><b>${s}</b> <span class="px">${formatPrice(p,s)}</span> <span class="ch up">+0.00%</span></span>`;
    }).join("");
    tk._init = true;
    tk.querySelectorAll(".tk").forEach(el=>{
      el.addEventListener("click",()=>{
        const sym = el.dataset.sym; const cat = symCategory(sym);
        document.getElementById("cat-select").value = cat; fillSymbols();
        document.getElementById("sym-select").value = sym; STATE.symbol = sym;
        loadCandles(sym, STATE.tf);
      });
    });
  } else {
    tk.querySelectorAll(".tk").forEach(el=>{
      const sym = el.dataset.sym;
      const cur = STATE.livePrices[sym] ?? BASE_PRICES[sym];
      const base = BASE_PRICES[sym] ?? cur;
      const ch = ((cur-base)/base)*100;
      el.querySelector(".px").textContent = formatPrice(cur,sym);
      const chEl = el.querySelector(".ch");
      chEl.textContent = (ch>=0?"+":"")+ch.toFixed(2)+"%";
      chEl.className = "ch "+(ch>=0?"up":"down");
    });
  }
}

/* ======================================================================
   BET / POSITIONS
   ====================================================================== */
function placeBet(direction){
  if(STATE.killActive){ alert("Kill switch är aktiverad — inga nya trades."); return; }
  const sym = document.getElementById("bet-sym").value;
  const tf = STATE.betTf;
  const amt = parseFloat(document.getElementById("bet-amt").value) || 10;
  const entry = STATE.livePrices[sym] ?? BASE_PRICES[sym];
  const expires = Date.now() + tf*1000;
  STATE.positions.push({
    id: Date.now()+"-"+Math.random().toString(36).slice(2,6),
    sym, direction, entry, amt, expires, tf
  });
  renderPositions();
}

function evalPositions(){
  const now = Date.now();
  const remaining = [];
  for(const p of STATE.positions){
    if(now >= p.expires){
      const cur = STATE.livePrices[p.sym] ?? p.entry;
      const won = (p.direction==="UP" && cur>p.entry) || (p.direction==="DOWN" && cur<p.entry);
      const profit = won ? p.amt*0.85 : -p.amt;
      STATE.history.unshift({...p, exit:cur, won, profit, closedAt:now});
    } else {
      remaining.push(p);
    }
  }
  if(remaining.length !== STATE.positions.length){
    STATE.positions = remaining;
    renderHistory();
  }
  renderPositions();
}

function renderPositions(){
  const el = document.getElementById("positions-list");
  if(!STATE.positions.length){ el.innerHTML = `<div style="color:var(--dim);text-align:center;padding:8px;font-size:11px">Inga aktiva positioner</div>`; return; }
  el.innerHTML = STATE.positions.map(p=>{
    const cur = STATE.livePrices[p.sym] ?? p.entry;
    const winning = (p.direction==="UP" && cur>p.entry) || (p.direction==="DOWN" && cur<p.entry);
    const remain = Math.max(0, Math.ceil((p.expires-Date.now())/1000));
    const mm = Math.floor(remain/60), ss = remain%60;
    return `<div class="pos-item ${p.direction.toLowerCase()}">
      <div class="row"><b>${p.sym}</b> <span class="${winning?'':''}" style="color:${winning?'var(--green)':'var(--red)'}">${p.direction} $${p.amt}</span></div>
      <div class="row"><span style="color:var(--dim)">Entry ${formatPrice(p.entry,p.sym)}</span> <span>Now ${formatPrice(cur,p.sym)}</span></div>
      <div class="row"><span style="color:var(--dim)">${winning?'WIN-bana':'LOSS-bana'}</span> <span class="timer">${String(mm).padStart(2,"0")}:${String(ss).padStart(2,"0")}</span></div>
    </div>`;
  }).join("");
}

function renderHistory(){
  const wins = STATE.history.filter(h=>h.won).length;
  const total = STATE.history.length;
  document.getElementById("win-rate").textContent = total ? Math.round(wins/total*100)+"%" : "0%";
  document.getElementById("win-stats").textContent = `${wins}W / ${total-wins}L · Total: ${total}`;
  const el = document.getElementById("history");
  el.innerHTML = STATE.history.slice(0,20).map(h=>{
    const sign = h.profit>=0?"+":"";
    return `<div class="hist-item ${h.won?'win':'loss'}"><span><b>${h.sym}</b> ${h.direction}</span><span>${sign}$${h.profit.toFixed(2)}</span></div>`;
  }).join("");
}

function updatePnL(){
  const realized = STATE.history.reduce((s,h)=>s+h.profit,0);
  const el = document.getElementById("pnl");
  el.textContent = (realized>=0?"+":"")+"$"+realized.toFixed(2);
  el.className = "pnl "+(realized>=0?"up":"down");
}

// Kompakt signal per agent — visas i tile
function agentSignal(key, d){
  d = d || {};
  switch(key){
    case "macro":      return {text:d.regime||"–", cls:d.regime==="RISK_ON"?"green":d.regime==="RISK_OFF"?"red":"yellow"};
    case "technical":  return {text:(d.bias||"–")+" "+(d.topPick||""), cls:d.bias==="bullish"?"green":d.bias==="bearish"?"red":"yellow"};
    case "sentiment":  return {text:(d.sentiment||"–").replace("_"," "), cls:["extreme_greed","greed"].includes(d.sentiment)?"green":["extreme_fear","fear"].includes(d.sentiment)?"red":"yellow"};
    case "risk":       return {text:(d.level||"–")+" · "+(d.heat||0)+"%", cls:["critical","high"].includes(d.level)?"red":d.level==="medium"?"yellow":"green"};
    case "quant":      return {text:"Sharpe "+(d.sharpe||"–"), cls:d.sharpe>1.2?"green":d.sharpe<0.8?"red":""};
    case "options":    return {text:"IV "+(d.ivEnv||"–"), cls:d.ivEnv==="elevated"?"yellow":d.ivEnv==="crushed"?"red":""};
    case "portfolio":  return {text:(d.diversification||0)+"/100", cls:d.diversification>70?"green":d.diversification<40?"red":"yellow"};
    case "execution":  return {text:d.urgency||"–", cls:d.urgency==="high"?"red":d.urgency==="medium"?"yellow":"green"};
    case "advisor":    return {text:d.cycle||"–", cls:""};
    case "head":       return {text:(d.decision||"HOLD")+" · "+((d.actions||[]).length)+"x", cls:d.decision==="BUY"?"green":d.decision==="SELL"?"red":"yellow"};
  }
  return {text:"–", cls:""};
}

// Schemalagda körningstider — global loop var 6:e timme = 4 sessions/dag
const SCHEDULE = {
  intervalSec: 21600,
  // Synliga fasta tider (UTC) som visas i banner — matchar var-6h om container startar 00:00 UTC
  slots: ["00:00","06:00","12:00","18:00"]
};

function getNextRun(){
  // Använd lastRun (om finns) annars antag att senaste slot redan inträffat
  const now = new Date();
  const slots = SCHEDULE.slots.map(s=>{
    const [h,m] = s.split(":").map(Number);
    const d = new Date(); d.setUTCHours(h,m,0,0);
    return d;
  });
  // Hitta nästa slot som ligger efter "nu"
  let next = slots.find(d => d > now);
  if(!next){ next = new Date(slots[0]); next.setUTCDate(next.getUTCDate()+1); }
  return next;
}
function fmtTimeUTC(d){ return String(d.getUTCHours()).padStart(2,"0")+":"+String(d.getUTCMinutes()).padStart(2,"0"); }
function fmtRel(d){
  const ms = d - new Date();
  if(ms <= 0) return "nu";
  const h = Math.floor(ms/3600000), m = Math.floor((ms%3600000)/60000);
  if(h>0) return `${h}h ${m}m`;
  return `${m}m`;
}

function renderTeamBanner(){
  const banner = document.getElementById("team-banner");
  if(!banner) return;
  const now = new Date();
  const lastRunStr = STATE.lastRun ? fmtTimeUTC(STATE.lastRun) : "–";
  const next = getNextRun();
  const slotsHtml = SCHEDULE.slots.map(s=>{
    const [h,m] = s.split(":").map(Number);
    const d = new Date(); d.setUTCHours(h,m,0,0);
    const isPast = d < now;
    const isNext = fmtTimeUTC(d) === fmtTimeUTC(next);
    return `<span class="slot ${isPast && !isNext ? 'done':''} ${isNext?'next':''}">${s} UTC</span>`;
  }).join("");
  banner.innerHTML = `
    <span class="auto-dot"></span>
    <b>Autonomt team</b>
    <span class="lbl">·</span>
    <span class="lbl">Senaste:</span> <b>${lastRunStr}</b>
    <span class="lbl">·</span>
    <span class="lbl">Nästa:</span> <span class="next-run">${fmtTimeUTC(next)} UTC (om ${fmtRel(next)})</span>
    <div class="schedule-list">${slotsHtml}</div>
  `;
}

  const avGradients = {macro:"linear-gradient(135deg,#f59e0b,#d97706)",technical:"linear-gradient(135deg,#3b82f6,#1d4ed8)",sentiment:"linear-gradient(135deg,#fb923c,#ea580c)",risk:"linear-gradient(135deg,#ef4444,#b91c1c)",quant:"linear-gradient(135deg,#60a5fa,#2563eb)",options:"linear-gradient(135deg,#eab308,#a16207)",portfolio:"linear-gradient(135deg,#10b981,#047857)",execution:"linear-gradient(135deg,#06b6d4,#0e7490)",advisor:"linear-gradient(135deg,#8b5cf6,#6d28d9)",head:"linear-gradient(135deg,#fff,#cbd5e1)"};
  const av = document.getElementById("modal-avatar");
  av.style.background = avGradients[agentKey] || "var(--card)";
  av.style.color = agentKey==="head" ? "#0a0e17" : "#fff";
  av.innerHTML = def.initial + (def.premium ? '<span class="star">★</span>' : '');

  document.getElementById("analysis-detail").innerHTML = agentDetailHTML(agentKey);
  // Quick prompts
  const qp = agentQuickPrompts(agentKey);
  document.getElementById("quick-prompts").innerHTML = qp.map(p=>`<button data-q="${p.replace(/"/g,'&quot;')}">${p}</button>`).join("");
  document.getElementById("quick-prompts").querySelectorAll("button").forEach(b=>{
    b.addEventListener("click",()=>{
      document.getElementById("chat-input").value = b.dataset.q;
      document.getElementById("chat-input").focus();
    });
  });
  switchTab("analysis");
  renderChat(agentKey);
  document.getElementById("modal-bg").classList.add("on");
  document.getElementById("chat-input").dataset.agent = agentKey;
}

function switchTab(tab){
  activeTab = tab;
  document.querySelectorAll(".modal-tabs button").forEach(b=>b.classList.toggle("on", b.dataset.tab===tab));
  document.getElementById("tab-analysis-pane").classList.toggle("on", tab==="analysis");
  document.getElementById("tab-chat-pane").classList.toggle("on", tab==="chat");
  document.getElementById("modal-footer").style.display = tab==="chat" ? "flex" : "none";
  if(tab==="chat") setTimeout(()=>document.getElementById("chat-input").focus(), 50);
}

function closeChat(){ document.getElementById("modal-bg").classList.remove("on"); activeAgent = null; }

function renderChat(key){
  const log = chatLogs[key] || [];
  const isHead = key==="head";
  const sendBtn = document.getElementById("chat-send");
  sendBtn.classList.toggle("order", isHead);
  sendBtn.textContent = isHead ? "Skicka order" : "Skicka";
  document.getElementById("chat-input").placeholder = isHead ? "Order eller fråga (t.ex. 'Köp BTC $100')..." : "Skriv din fråga…";
  document.getElementById("chat-log").innerHTML = log.length
    ? log.map(m=>`<div class="q">▸ ${m.q}</div><div class="a">${m.a}</div>`).join("")
    : `<div style="color:var(--dim);font-size:11px;padding:8px">Inga frågor än. Använd quick prompts nedan eller skriv egen.</div>`;
  document.getElementById("chat-log").scrollTop = 999999;
}
async function sendChat(){
  const input = document.getElementById("chat-input");
  const q = input.value.trim();
  if(!q) return;
  const key = input.dataset.agent;
  if(!chatLogs[key]) chatLogs[key]=[];
  chatLogs[key].push({q, a:"…"});
  renderChat(key);
  input.value = "";

  try{
    let answer;
    if(CFG.mode === "live"){
      const r = await apiPost("/api/ask-agent", {agent:key, question:q});
      answer = r?.response || JSON.stringify(r);
    } else {
      // simulated answer
      await sleep(600 + Math.random()*900);
      answer = simulateAgentAnswer(key, q);
    }
    chatLogs[key][chatLogs[key].length-1].a = answer;
    renderChat(key);
  } catch(e){
    chatLogs[key][chatLogs[key].length-1].a = "Fel: "+e.message;
    renderChat(key);
  }
}
function simulateAgentAnswer(key, q){
  const def = AGENT_DEFS.find(a=>a.key===key);
  const replies = {
    macro:`Min makro-läsning just nu: ${STATE.agents.macro?.regime||"NEUTRAL"} regim. Du frågar om "${q}" — nyckelfaktorer är Fed-policy, dollar-styrka och commodity-priser. Förväntad volatilitet kommande vecka är förhöjd givet centralbanks-kalendern.`,
    technical:`Tekniskt på din fråga "${q}": jag ser ${STATE.agents.technical?.bias||"mixed"} bias på huvudpariteter. Stöd ligger vid 50-EMA, motstånd vid förra veckans high. Bredd är försämrad — tradera selektivt.`,
    sentiment:`Sentiment är ${STATE.agents.sentiment?.sentiment||"neutral"}. På "${q}" — narrativen i marknaden domineras av AI-temat och rate-cut förväntningar. Politiker-flöden visar köp i tech.`,
    risk:`Risk-bedömning: nivå ${STATE.agents.risk?.level||"medium"}, heat ${STATE.agents.risk?.heat||0}%. Din fråga "${q}" — jag rekommenderar att hålla position size konservativ tills korrelationen sjunker.`,
    quant:`Kvantitativ vy på "${q}": vol-regim är ${STATE.agents.quant?.volRegime||"medium"}, Sharpe ${STATE.agents.quant?.sharpe||"–"}. Trend-modeller är positiva men mean-reversion-signal flashar i shortterm.`,
    options:`Options-perspektiv på "${q}": IV-miljön är ${STATE.agents.options?.ivEnv||"normal"}. Sälj-premium-strategier är attraktiva i high-IV-rank namn. Wheeling fortsätter fungera i TSLA/NVDA.`,
    portfolio:`Portfölj-vy på "${q}": diversifiering ${STATE.agents.portfolio?.diversification||0}/100, cash ${STATE.agents.portfolio?.cashPct||0}%. Sektor-koncentrationen i crypto är hög — överväg trim.`,
    execution:`Exekvering på "${q}": urgency ${STATE.agents.execution?.urgency||"medium"}. Använd TWAP eller DCA i 3 splits för att minimera slippage. Undvik market-orders första 5 min efter open.`,
    advisor:`Strategisk reflektion på "${q}": ${STATE.agents.advisor?.outlook||"Marknaden är i en mellancykel-fas."} Akta dig för FOMO efter senaste rallyt — håll thesisen disciplinerad. Jag ser ${STATE.agents.advisor?.contrarian||"inga starka contrarian-positioner"}.`,
    head:`Head Trader-beslut: ${STATE.agents.head?.decision||"HOLD"}. På din fråga "${q}" — vi konsoliderar position innan nästa makro-trigger. Rule of 3 håller.`
  };
  return replies[key] || "Inget svar tillgängligt i demo-läge.";
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

/* ======================================================================
   API CLIENT
   ====================================================================== */
async function apiGet(path){
  const r = await fetch(CFG.url + path, { headers: CFG.key ? {"x-api-key":CFG.key} : {} });
  if(!r.ok) throw new Error("HTTP "+r.status);
  return r.json();
}
async function apiPost(path, body){
  const r = await fetch(CFG.url + path, {
    method:"POST",
    headers:{ "Content-Type":"application/json", ...(CFG.key?{"x-api-key":CFG.key}:{}) },
    body: JSON.stringify(body)
  });
  if(!r.ok) throw new Error("HTTP "+r.status);
  return r.json();
}

let sse = null;
function startSSE(){
  if(sse){ sse.close(); sse=null; }
  if(CFG.mode !== "live") return;
  try{
    sse = new EventSource(CFG.url + "/api/events");
    sse.onmessage = e=>{
      try{
        const ev = JSON.parse(e.data);
        if(ev.type === "team-reports"){ STATE.agents = mapBackendToAgents(ev.payload); renderAgents(); }
        else if(ev.type === "turn-complete"){ document.getElementById("last-turn").textContent = "Klar "+new Date().toLocaleTimeString(); updateTiming(ev.payload); }
        else if(ev.type === "trade"){ /* could prepend to a trade log */ }
        else if(ev.type === "kill-switch"){ STATE.killActive = !!ev.payload?.active; document.getElementById("kill-btn").classList.toggle("active", STATE.killActive); }
        else if(ev.type === "broker-changed"){ document.getElementById("broker-select").value = ev.payload?.broker; }
      }catch(_){}
    };
    sse.onerror = ()=>{ document.getElementById("conn-dot").classList.remove("live"); };
    sse.onopen = ()=>{ document.getElementById("conn-dot").classList.add("live"); };
  }catch(e){ console.warn("SSE failed", e); }
}

function mapBackendToAgents(p){
  // Backend report shape may differ — pass-through with defaults
  return p || STATE.agents;
}

function updateTiming(p){
  if(!p) return;
  document.getElementById("t-spec").textContent = (p.specialists||0).toFixed(1)+"s";
  document.getElementById("t-exec").textContent = (p.exec||0).toFixed(1)+"s";
  document.getElementById("t-head").textContent = (p.head||0).toFixed(1)+"s";
  document.getElementById("t-tot").textContent = (p.total||0).toFixed(1)+"s";
}

async function loadFromBackend(){
  if(CFG.mode !== "live") return false;
  try{
    const [status, decisions] = await Promise.all([
      apiGet("/api/state").catch(()=>null),
      apiGet("/api/decisions?limit=10").catch(()=>null)
    ]);
    if(status?.killSwitch !== undefined){
      STATE.killActive = !!status.killSwitch;
      document.getElementById("kill-btn").classList.toggle("active", STATE.killActive);
    }
    return true;
  } catch(e){ return false; }
}

/* ======================================================================
   EVENT WIRING
   ====================================================================== */
function wire(){
  document.getElementById("cat-select").addEventListener("change",()=>{ fillSymbols(); STATE.symbol=document.getElementById("sym-select").value; loadCandles(STATE.symbol,STATE.tf); });
  document.getElementById("sym-select").addEventListener("change", e=>{ STATE.symbol = e.target.value; loadCandles(STATE.symbol,STATE.tf); });

  document.getElementById("tf-group").addEventListener("click", e=>{
    if(!e.target.dataset.tf) return;
    document.querySelectorAll("#tf-group button").forEach(b=>b.classList.remove("active"));
    e.target.classList.add("active");
    STATE.tf = e.target.dataset.tf;
    loadCandles(STATE.symbol, STATE.tf);
  });

  document.getElementById("ind-toggles").addEventListener("click", e=>{
    if(!e.target.dataset.ind) return;
    const ind = e.target.dataset.ind;
    STATE.indicators[ind] = !STATE.indicators[ind];
    e.target.classList.toggle("on", STATE.indicators[ind]);
    const key = STATE.symbol+"|"+STATE.tf;
    applyIndicators(STATE.candleData[key]||[]);
  });

  document.getElementById("bet-tf").addEventListener("click", e=>{
    if(!e.target.dataset.tf) return;
    document.querySelectorAll("#bet-tf button").forEach(b=>b.classList.remove("active"));
    e.target.classList.add("active");
    STATE.betTf = parseInt(e.target.dataset.tf,10);
  });
  document.getElementById("bet-amt").addEventListener("input", e=>{
    const v = parseFloat(e.target.value)||0;
    document.getElementById("bet-win").textContent = "$"+(v*0.85).toFixed(2);
  });
  document.getElementById("bet-call").addEventListener("click",()=>placeBet("UP"));
  document.getElementById("bet-put").addEventListener("click",()=>placeBet("DOWN"));

  document.getElementById("kill-btn").addEventListener("click", async ()=>{
    STATE.killActive = !STATE.killActive;
    document.getElementById("kill-btn").classList.toggle("active", STATE.killActive);
    if(CFG.mode==="live"){
      try{ await apiPost("/api/kill-switch",{active:STATE.killActive}); }catch(_){}
    }
  });

  document.getElementById("run-btn").addEventListener("click", async ()=>{
    const btn = document.getElementById("run-btn");
    btn.disabled = true; btn.textContent = "Kör…";
    try{
      if(CFG.mode==="live"){
        await apiPost("/api/run-agent",{});
      } else {
        await sleep(1200);
        STATE.agents = genSimAgents();
        renderAgents();
        document.getElementById("last-turn").textContent = "Demo-turn "+new Date().toLocaleTimeString();
        updateTiming({specialists:5.4, exec:1.1, head:2.7, total:9.2});
      }
    }catch(e){ alert("Fel: "+e.message); }
    finally{ btn.disabled=false; btn.textContent="▶ Kör analys"; }
  });

  document.getElementById("broker-select").addEventListener("change", async e=>{
    if(CFG.mode==="live"){
      try{ await apiPost("/api/active-broker",{broker:e.target.value}); }catch(_){}
    }
  });

  // Modal
  document.getElementById("modal-close").addEventListener("click", closeChat);
  document.getElementById("modal-bg").addEventListener("click", e=>{ if(e.target.id==="modal-bg") closeChat(); });
  document.getElementById("chat-send").addEventListener("click", sendChat);
  document.getElementById("chat-input").addEventListener("keydown", e=>{ if(e.key==="Enter") sendChat(); });
  document.querySelectorAll(".modal-tabs button").forEach(b=>{
    b.addEventListener("click", ()=>switchTab(b.dataset.tab));
  });
  document.addEventListener("keydown", e=>{ if(e.key==="Escape" && document.getElementById("modal-bg").classList.contains("on")) closeChat(); });

  // Settings
  document.getElementById("cfg-url").value = CFG.url;
  document.getElementById("cfg-key").value = CFG.key;
  document.getElementById("cfg-mode").value = CFG.mode;
  ["cfg-url","cfg-key","cfg-mode"].forEach(id=>{
    document.getElementById(id).addEventListener("change", e=>{
      const k = id.replace("cfg-","");
      CFG[k] = e.target.value;
      localStorage.setItem("trading_"+k, e.target.value);
      if(k==="mode") startSSE();
    });
  });
  document.getElementById("test-conn").addEventListener("click", testConnection);
}

async function testConnection(){
  const el = document.getElementById("conn-status");
  el.className = "status-line warn"; el.textContent = "Testar…";
  try{
    const r = await fetch(CFG.url + "/api/status", { headers: CFG.key ? {"x-api-key":CFG.key} : {} });
    if(!r.ok) throw new Error("HTTP "+r.status);
    const j = await r.json();
    el.className = "status-line ok"; el.textContent = "✔ Backend nås. "+JSON.stringify(j).slice(0,120);
    document.getElementById("conn-dot").classList.add("live");
  }catch(e){
    el.className = "status-line err"; el.textContent = "✘ "+e.message;
    document.getElementById("conn-dot").classList.remove("live");
  }
}

/* ======================================================================
   BOOT
   ====================================================================== */
function boot(){
  fillSymbols();
  fillBetSymbols();
  initChart();
  loadCandles(STATE.symbol, STATE.tf);
  STATE.agents = genSimAgents();
  renderAgents();
  updateTiming({specialists:0, exec:0, head:0, total:0});
  document.getElementById("last-turn").textContent = "Demo-data laddad";
  document.querySelector("#bet-tf button[data-tf='300']")?.classList.add("active");
  document.getElementById("bet-win").textContent = "$"+(STATE.betAmt*0.85).toFixed(2);
  wire();
  setInterval(tick, 2000);
  if(CFG.mode === "live"){ loadFromBackend(); startSSE(); }
}

document.addEventListener("DOMContentLoaded", boot);
</script>
